<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>online_video_player</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <h1>online_video_player</h1>
        <input id="fileInput" type="file" accept="video/*" multiple aria-label="動画ファイルを選択" />
      </header>

      <section id="dropZone" class="player" aria-label="動画表示領域">
        <video id="video" controls playsinline preload="metadata"></video>
      </section>

      <div class="toolbar" aria-label="プレイヤー操作">
        <button id="prevButton" type="button">前へ</button>
        <button id="nextButton" type="button">次へ</button>
        <button id="modeButton" type="button">連続再生</button>
        <label>
          速度
          <select id="rateSelect" aria-label="再生速度">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2x</option>
          </select>
        </label>
      </div>

      <div id="status" class="status" role="status" aria-live="polite">動画ファイルを選択してください。</div>
      <ol id="playlist" class="playlist" aria-label="読み込み済み動画"></ol>
    </main>
  </body>
</html>
