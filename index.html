<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>online_video_player</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #f4f4f4;
      }

      main {
        width: min(1100px, 100%);
        margin: 0 auto;
        padding: 16px;
      }

      header,
      .toolbar,
      .status,
      .playlist {
        margin-top: 12px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .player {
        margin-top: 16px;
        border: 1px solid #333;
        background: #000;
      }

      .player.dragging {
        outline: 3px solid #69a7ff;
      }

      video {
        display: block;
        width: 100%;
        max-height: calc(100vh - 190px);
        background: #000;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      button,
      select,
      input[type="file"] {
        min-height: 36px;
        border: 1px solid #444;
        border-radius: 6px;
        background: #202020;
        color: #f4f4f4;
        font: inherit;
      }

      button,
      select {
        padding: 6px 10px;
      }

      button {
        cursor: pointer;
      }

      button:hover,
      button:focus-visible,
      select:focus-visible,
      input[type="file"]:focus-visible {
        border-color: #69a7ff;
        outline: none;
      }

      .status {
        min-height: 24px;
        color: #c9c9c9;
      }

      .status.error {
        color: #ff9a9a;
      }

      .playlist {
        display: grid;
        gap: 6px;
        padding: 0;
        list-style: none;
      }

      .track {
        width: 100%;
        overflow: hidden;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .track.active {
        border-color: #69a7ff;
        background: #263244;
      }

      @media (max-width: 640px) {
        main {
          padding: 10px;
        }

        video {
          max-height: calc(100vh - 240px);
        }

        input[type="file"] {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>online_video_player</h1>
        <input id="fileInput" type="file" accept="video/*" multiple aria-label="動画ファイルを選択" />
      </header>

      <section id="dropZone" class="player" aria-label="動画表示領域">
        <video id="video" controls playsinline preload="metadata"></video>
      </section>

      <div class="toolbar" aria-label="プレイヤー操作">
        <button id="prevButton" type="button">前へ</button>
        <button id="nextButton" type="button">次へ</button>
        <button id="modeButton" type="button">連続再生</button>
        <label>
          速度
          <select id="rateSelect" aria-label="再生速度">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="1.75">1.75x</option>
            <option value="2">2x</option>
          </select>
        </label>
      </div>

      <div id="status" class="status" role="status" aria-live="polite">動画ファイルを選択してください。</div>
      <ol id="playlist" class="playlist" aria-label="読み込み済み動画"></ol>
    </main>

    <script>
      const video = document.getElementById("video");
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");
      const statusEl = document.getElementById("status");
      const playlistEl = document.getElementById("playlist");
      const prevButton = document.getElementById("prevButton");
      const nextButton = document.getElementById("nextButton");
      const modeButton = document.getElementById("modeButton");
      const rateSelect = document.getElementById("rateSelect");

      const modes = [
        { id: "auto", label: "連続再生" },
        { id: "loop", label: "単体ループ" },
        { id: "stop", label: "終了で停止" }
      ];

      let files = [];
      let currentIndex = -1;
      let currentUrl = "";
      let modeIndex = 0;

      const isVideoFile = (file) => {
        return file.type.startsWith("video/") || /\.(mp4|webm|ogg|ogv|mov|m4v)$/i.test(file.name);
      };

      const setStatus = (message, isError = false) => {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      };

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

      const hasPlayableVideo = () => currentIndex >= 0 && Number.isFinite(video.duration);

      const releaseCurrentUrl = () => {
        if (!currentUrl) return;
        URL.revokeObjectURL(currentUrl);
        currentUrl = "";
      };

      const updateMode = () => {
        const mode = modes[modeIndex];
        video.loop = mode.id === "loop";
        modeButton.textContent = mode.label;
      };

      const updateRate = () => {
        rateSelect.value = String(video.playbackRate);
      };

      const renderPlaylist = () => {
        playlistEl.textContent = "";
        const fragment = document.createDocumentFragment();

        files.forEach((file, index) => {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.className = `track${index === currentIndex ? " active" : ""}`;
          button.textContent = file.name;
          button.addEventListener("click", () => loadVideo(index, true));
          item.appendChild(button);
          fragment.appendChild(item);
        });

        playlistEl.appendChild(fragment);
      };

      const loadVideo = async (index, shouldPlay) => {
        const file = files[index];
        if (!file) return;

        currentIndex = index;
        releaseCurrentUrl();
        currentUrl = URL.createObjectURL(file);
        video.src = currentUrl;
        video.load();
        updateMode();
        renderPlaylist();
        setStatus(`読み込み: ${file.name}`);

        if (!shouldPlay) return;

        try {
          await video.play();
        } catch {
          setStatus("再生を開始できませんでした。再生ボタンを押してください。", true);
        }
      };

      const setFiles = (fileList) => {
        const nextFiles = Array.from(fileList).filter(isVideoFile);

        if (nextFiles.length === 0) {
          clearSelection();
          setStatus("未対応形式です。動画ファイルを選択してください。", true);
          return;
        }

        releaseCurrentUrl();
        files = nextFiles;
        currentIndex = -1;
        loadVideo(0, false);
        setStatus(`${files.length}件の動画を読み込みました。`);
      };

      const clearSelection = () => {
        releaseCurrentUrl();
        files = [];
        currentIndex = -1;
        video.removeAttribute("src");
        video.load();
        renderPlaylist();
        setStatus("動画ファイルを選択してください。");
      };

      const togglePlay = async () => {
        if (currentIndex < 0) return;

        if (!video.paused) {
          video.pause();
          return;
        }

        try {
          await video.play();
        } catch {
          setStatus("再生を開始できませんでした。再生ボタンを押してください。", true);
        }
      };

      const moveTrack = (step) => {
        if (files.length === 0) return;
        const nextIndex = (currentIndex + step + files.length) % files.length;
        loadVideo(nextIndex, true);
      };

      const seekBy = (seconds) => {
        if (!hasPlayableVideo()) return;
        video.currentTime = clamp(video.currentTime + seconds, 0, video.duration);
      };

      const seekPercent = (percent) => {
        if (!hasPlayableVideo()) return;
        video.currentTime = clamp(video.duration * percent, 0, video.duration);
      };

      const changeVolume = (step) => {
        video.volume = clamp(video.volume + step, 0, 1);
        if (video.volume > 0) video.muted = false;
      };

      const changeRate = (step) => {
        const nextRate = Math.round(clamp(video.playbackRate + step, 0.25, 2) * 100) / 100;
        video.playbackRate = nextRate;
        updateRate();
      };

      const toggleFullscreen = async () => {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else {
            const target = video.requestFullscreen ? video : document.documentElement;
            await target.requestFullscreen();
          }
        } catch {
          setStatus("全画面表示に切り替えできませんでした。", true);
        }
      };

      const cycleMode = () => {
        modeIndex = (modeIndex + 1) % modes.length;
        updateMode();
        setStatus(`再生モード: ${modes[modeIndex].label}`);
      };

      fileInput.addEventListener("change", () => {
        setFiles(fileInput.files);
        fileInput.value = "";
      });

      prevButton.addEventListener("click", () => moveTrack(-1));
      nextButton.addEventListener("click", () => moveTrack(1));
      modeButton.addEventListener("click", cycleMode);
      rateSelect.addEventListener("change", () => {
        video.playbackRate = Number(rateSelect.value);
      });

      dropZone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropZone.classList.add("dragging");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragging");
      });

      dropZone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropZone.classList.remove("dragging");
        setFiles(event.dataTransfer.files);
      });

      document.addEventListener("dragover", (event) => {
        event.preventDefault();
      });

      document.addEventListener("drop", (event) => {
        event.preventDefault();
      });

      video.addEventListener("loadedmetadata", () => {
        setStatus(`再生準備完了: ${files[currentIndex]?.name || ""}`);
      });

      video.addEventListener("ended", () => {
        const mode = modes[modeIndex].id;
        if (mode === "auto" && currentIndex < files.length - 1) {
          loadVideo(currentIndex + 1, true);
          return;
        }
        setStatus("再生が終了しました。");
      });

      video.addEventListener("error", () => {
        setStatus("動画を再生できません。未対応形式または読み込み失敗の可能性があります。", true);
      });

      fileInput.addEventListener("click", () => {
        fileInput.value = "";
      });

      document.addEventListener("keydown", async (event) => {
        if (event.ctrlKey || event.metaKey || event.altKey) return;
        const key = event.key;
        const lowerKey = key.toLowerCase();

        if (key === "Escape" && document.fullscreenElement) {
          event.preventDefault();
          await document.exitFullscreen();
          return;
        }

        if (event.target instanceof Element && event.target.closest("input, select, textarea, button")) return;

        if (key === " " || lowerKey === "k" || lowerKey === "o") {
          event.preventDefault();
          await togglePlay();
        } else if (key === "ArrowLeft") {
          event.preventDefault();
          seekBy(-5);
        } else if (key === "ArrowRight") {
          event.preventDefault();
          seekBy(5);
        } else if (lowerKey === "p") {
          event.preventDefault();
          if (hasPlayableVideo()) seekBy(-video.duration * 0.01);
        } else if (lowerKey === "i") {
          event.preventDefault();
          if (hasPlayableVideo()) seekBy(video.duration * 0.01);
        } else if (lowerKey === "j") {
          event.preventDefault();
          seekBy(-10);
        } else if (lowerKey === "l") {
          event.preventDefault();
          seekBy(10);
        } else if (key === "ArrowUp") {
          event.preventDefault();
          changeVolume(0.05);
        } else if (key === "ArrowDown") {
          event.preventDefault();
          changeVolume(-0.05);
        } else if (lowerKey === "m") {
          event.preventDefault();
          video.muted = !video.muted;
        } else if (lowerKey === "f") {
          event.preventDefault();
          await toggleFullscreen();
        } else if (key === "Enter") {
          event.preventDefault();
          moveTrack(1);
        } else if (key === "Backspace") {
          event.preventDefault();
          moveTrack(-1);
        } else if (key === "[") {
          event.preventDefault();
          changeRate(-0.25);
        } else if (key === "]") {
          event.preventDefault();
          changeRate(0.25);
        } else if (/^[0-9]$/.test(key)) {
          event.preventDefault();
          seekPercent(Number(key) / 10);
        } else if (key === ".") {
          event.preventDefault();
          video.pause();
          seekBy(1 / 30);
        } else if (key === ",") {
          event.preventDefault();
          video.pause();
          seekBy(-1 / 30);
        } else if (lowerKey === "u") {
          event.preventDefault();
          cycleMode();
        }
      });

      updateMode();
      updateRate();
    </script>
  </body>
</html>
